<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Banglabash WorkFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div>
                <h1><i class="fa-solid fa-clock"></i>Banglabash WorkFlow</h1>
                <p>Manage your Time</p>
            </div>
            <div class="user-actions" style="display: flex; gap: 1rem;">
                <button id="btn-admin-panel" class="btn-secondary"
                    style="font-size: 0.9rem; padding: 0.5rem 1rem; display: none;">
                    <i class="fa-solid fa-users-cog"></i> Admin
                </button>
                <button id="btn-change-password" class="btn-secondary" style="font-size: 0.9rem; padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-key"></i> Key
                </button>
                <button id="btn-logout" class="btn-primary"
                    style="background: var(--danger-color, #ef4444); border-color: var(--danger-color, #ef4444); font-size: 0.9rem; padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <!-- Password Modal -->
        <div id="password-modal" class="modal-overlay"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
            <div class="card glass" style="width: 100%; max-width: 400px; padding: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="margin: 0;">Change Password</h3>
                    <button id="close-modal"
                        style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;"><i
                            class="fa-solid fa-times"></i></button>
                </div>
                <form id="password-form">
                    <div class="form-group">
                        <label for="old-password">Current Password</label>
                        <input type="password" id="old-password" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Submit</button>
                    <div id="password-error" class="error-msg" style="margin-top: 1rem; text-align: center;"></div>
                </form>
            </div>
        </div>

        <main>
            <section class="dashboard">
                <div class="card glass">
                    <h3>Total Today</h3>
                    <div class="stat" id="total-today">0h 0m</div>
                </div>
                <div class="card glass">
                    <h3>Total Week</h3>
                    <div class="stat" id="total-week">0h 0m</div>
                </div>
            </section>

            <section class="input-section glass">
                <h2>New Schedule</h2>
                <form id="work-form">
                    <div class="form-group type-selector" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <label class="radio-card" style="flex: 1; cursor: pointer;">
                            <input type="radio" name="recordType" value="work" checked style="display: none;">
                            <div class="card-content glass" id="card-work" style="text-align: center; padding: 0.5rem; border: 2px solid var(--primary-color); border-radius: 8px;">
                                Horas de Trabajo
                            </div>
                        </label>
                        <label class="radio-card" style="flex: 1; cursor: pointer;">
                            <input type="radio" name="recordType" value="practicum" style="display: none;">
                            <div class="card-content glass" id="card-practicum" style="text-align: center; padding: 0.5rem; border: 2px solid transparent; border-radius: 8px;">
                                Horas de Practicum
                            </div>
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="start-time">Start Time</label>
                            <input type="time" id="start-time" required>
                        </div>
                        <div class="form-group">
                            <label for="end-time">End Time</label>
                            <input type="time" id="end-time" required>
                        </div>
                    </div>
                    <div class="form-group toggle-group" style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem; margin-bottom: 1.25rem;">
                        <label class="switch">
                            <input type="checkbox" id="day-off-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span style="font-weight: 600; color: var(--text-color);">Day Off</span>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" value="CornerStone" placeholder="What did you work on?"
                            autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-plus"></i> Add
                    </button>
                    <div id="form-error" class="error-msg"></div>
                </form>
            </section>

            <section class="entries-section glass">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0;">History</h2>
                    <div class="history-tabs" style="display: flex; gap: 0.5rem; background: rgba(15, 23, 42, 0.6); padding: 0.25rem; border-radius: 8px;">
                        <button type="button" id="tab-work" class="tab-btn active" style="background: var(--primary-color); border: none; padding: 0.5rem 1rem; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; transition: all 0.2s;">Trabajo</button>
                        <button type="button" id="tab-practicum" class="tab-btn" style="background: transparent; border: none; padding: 0.5rem 1rem; border-radius: 6px; color: var(--text-muted); cursor: pointer; font-weight: 600; transition: all 0.2s;">Practicum</button>
                    </div>
                </div>
                <div id="entries-list" class="entries-list">
                    <!-- Entries will be injected here -->
                    <div class="empty-state">
                        <i class="fa-regular fa-calendar-xmark"></i>
                        <p>No entries yet</p>
                    </div>
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
