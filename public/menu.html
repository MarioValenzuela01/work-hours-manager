<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banglabash WorkFlow</title>
    <link rel="icon" type="image/png" href="/images/logoLogin.png?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .menu-grid {
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .menu-card {
            padding: 2rem;
            text-align: center;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }

            header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 1rem;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .user-actions {
                width: 100%;
            }

            .user-actions button {
                width: 100%;
            }

            .menu-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-top: 1.5rem;
            }

            .menu-card {
                padding: 1.5rem;
            }

            .menu-icon {
                font-size: 3rem;
            }

            .menu-card h2 {
                font-size: 1.4rem;
            }

            .menu-card p {
                font-size: 0.95rem;
            }

            .menu-card button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">

        <header style="display:flex; justify-content:space-between; align-items:center; width:100%;">

            <div>
                <h1>
                    <i class="fa-solid fa-layer-group"></i>
                    Banglabash WorkFlow
                </h1>

                <p>Select an option</p>
            </div>

            <div class="user-actions" style="display:flex; gap:1rem;">

                <button id="btn-logout" class="btn-primary" style="background: var(--danger-color, #ef4444);
                           border-color: var(--danger-color, #ef4444);
                           font-size: 0.9rem;
                           padding: 0.5rem 1rem;">

                    <i class="fa-solid fa-sign-out-alt"></i>
                    Logout
                </button>

            </div>

        </header>

        <main>

            <section class="menu-grid">

    <div class="card glass menu-card" onclick="window.location.href='index.html'">
        <div class="menu-icon">
            <i class="fa-solid fa-clock"></i>
        </div>

        <h2>Hours</h2>
        <p>Manage work and practicum hours</p>

        <button class="btn-primary" style="margin-top:1rem;">
            Open Hours
        </button>
    </div>

    <div class="card glass menu-card" onclick="window.location.href='/inspection'">
        <div class="menu-icon">
            <i class="fa-solid fa-clipboard-check"></i>
        </div>

        <h2>Inspection Form</h2>
        <p>Open equipment inspection sheet</p>

        <button class="btn-primary" style="margin-top:1rem;">
            Open Inspection
        </button>

        
    </div>

    <div class="card glass menu-card" onclick="window.location.href='summary.html'">
        <div class="menu-icon">
            <i class="fa-solid fa-business-time"></i>
        </div>

        <h2>Summary Work Hours</h2>
        <p>View your work hours summary</p>

        <button class="btn-primary" style="margin-top:1rem;">
            Open Summary
        </button>

        
    </div>

</section>

        </main>

    </div>

    <script>

        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        document.getElementById('btn-logout')
            .addEventListener('click', () => {

                localStorage.removeItem('token');
                localStorage.removeItem('username');
                localStorage.removeItem('role');

                window.location.href = 'login.html';

            });

    </script>

</body>

</html>
