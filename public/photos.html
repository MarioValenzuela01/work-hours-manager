<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Maintenance Photos</title>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.replace("/login.html");
    }
  </script>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.9);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #6366f1;
      --danger: #ef4444;
      --border: rgba(148, 163, 184, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .button,
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .photo-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .photo-option {
      min-height: 210px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .photo-option:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .photo-option-icon {
      font-size: 64px;
      line-height: 1;
    }

    .photo-option-title {
      font-size: 22px;
      font-weight: 800;
    }

    .photo-option-subtitle {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 0 12px;
    }

    .message {
      margin-top: 14px;
      color: var(--muted);
    }

    .file-input-hidden {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .gallery-header h2 {
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .photo-thumb {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
      border-radius: 14px;
      background: #111827;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .photo-thumb:hover {
      transform: scale(1.02);
      border-color: var(--primary);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      padding: 24px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .modal.open {
      display: block;
    }

    .modal-content {
      position: relative;
      max-width: 1100px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .modal-content img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
      background: #020617;
    }

    .close-modal {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--danger);
      color: white;
      font-size: 26px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      z-index: 10000;
    }

    .delete-modal-button {
      margin-top: 14px;
      width: 100%;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .delete-modal-button:hover {
      opacity: 0.9;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .header,
      .gallery-header {
        flex-direction: column;
        align-items: stretch;
      }

      .button,
      button {
        width: 100%;
        text-align: center;
      }

      .photo-options {
        grid-template-columns: 1fr;
      }

      .photo-option {
        min-height: 190px;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .photo-thumb {
        height: 170px;
      }

      .close-modal {
        top: 8px;
        right: 8px;
      }
    }

    .thumb-wrapper {
      position: relative;
      width: 100%;
      height: 210px;
      border-radius: 14px;
      background: #111827;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .thumb-loading,
    .thumb-error {
      width: 100%;
      height: 100%;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-size: 14px;
    }

    .thumb-error {
      color: #fca5a5;
    }

    @media (max-width: 760px) {
      .thumb-wrapper {
        height: 170px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Maintenance Photos</h1>
      <a class="button" href="/">Back to Dashboard</a>
    </div>

    <div class="card">
      <div class="photo-options">
        <label class="photo-option" for="cameraInput">
          <div class="photo-option-icon">📷</div>
          <div class="photo-option-title">Take Photo</div>
          <div class="photo-option-subtitle">Open the camera from your phone</div>
        </label>

        <label class="photo-option" for="photosInput">
          <div class="photo-option-icon">🖼️</div>
          <div class="photo-option-title">Select Photo</div>
          <div class="photo-option-subtitle">Choose images from your phone or computer</div>
        </label>
      </div>

      <input id="cameraInput" class="file-input-hidden" type="file" accept="image/*" capture="environment" />

      <input id="photosInput" class="file-input-hidden" type="file" accept="image/*,.heic,.heif" multiple />

      <div id="uploadMessage" class="message"></div>
    </div>

    <div class="card">
      <div class="gallery-header">
        <h2>My Images</h2>
        <button type="button" id="refreshButton">Refresh</button>
      </div>

      <div id="gallery" class="gallery"></div>
    </div>
  </div>

  <div id="imageModal" class="modal">
    <div class="modal-content">
      <button type="button" id="closeModalButton" class="close-modal">×</button>

      <img id="modalImage" alt="Large preview" />

      <button type="button" id="deleteModalButton" class="delete-modal-button">
        Delete Photo
      </button>
    </div>
  </div>

  <script src="/js/photos.js?v=5"></script>
</body>

</html>
