<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Banglabash WorkFlow - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            text-align: center;
        }

        .auth-container h2 {
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }

        .auth-form .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .auth-form .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .auth-form .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .auth-form .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .auth-toggle {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary-color);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .auth-toggle a:hover {
            color: var(--secondary-color);
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-clock"></i>Banglabash WorkFlow</h1>
            <p>Manage your Time</p>
        </header>

        <main>
            <section class="auth-container card glass">
                <h2 id="auth-title">Login</h2>
                <form id="auth-form" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary" id="auth-submit">
                        <i class="fa-solid fa-sign-in-alt"></i> Login
                    </button>
                    <div id="auth-error" class="error-msg" style="margin-top: 1rem;"></div>
                </form>
                <div class="auth-toggle">
                    <span id="auth-toggle-text">Don't have an account?</span>
                    <a id="auth-toggle-link">Sign Up</a>
                </div>
            </section>
        </main>
    </div>

    <script src="login.js"></script>
</body>

</html>
