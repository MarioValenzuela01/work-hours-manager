    <script>
        function scaleForm() {
            const container = document.getElementById('form-container');
            const wrapper = document.getElementById('form-wrapper');

            const scale = wrapper.clientWidth / 800;
            container.style.transform = `scale(${scale})`;
        }

        window.addEventListener('load', scaleForm);
        window.addEventListener('resize', scaleForm);

        function generatePDF() {

            const data = {

                operator: document.getElementById('operator').value,
                date: document.getElementById('date').value,
                size: document.getElementById('size').value,
                serialNumber: document.getElementById('serialNumber').value,
                hourStart: document.getElementById('hourStart').value,

                field29: document.getElementById('field29').value,
                field30: document.getElementById('field30').value,
                field31: document.getElementById('field31').value,
                field32: document.getElementById('field32').value,
                field33: document.getElementById('field33').value,
                field34: document.getElementById('field34').value,
                field35: document.getElementById('field35').value,
                field36: document.getElementById('field36').value,
                field37: document.getElementById('field37').value,
                field38: document.getElementById('field38').value,
                field39: document.getElementById('field39').value,
                field40: document.getElementById('field40').value,
                field41: document.getElementById('field41').value,
                field42: document.getElementById('field42').value,
                field43: document.getElementById('field43').value,
                field44: document.getElementById('field44').value,
                field45: document.getElementById('field45').value,
                field46: document.getElementById('field46').value,
                field47: document.getElementById('field47').value,
                field48: document.getElementById('field48').value,
                field49: document.getElementById('field49').value,
                field50: document.getElementById('field50').value,
                field51: document.getElementById('field51').value,
                field52: document.getElementById('field52').value,
                field53: document.getElementById('field53').value,
                comments: document.getElementById('comments').value,
            };

            console.log("Sending data:", data);

            fetch(window.location.origin + '/inspection/pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(res => {
                    if (!res.ok) throw new Error("Server error");
                    return res.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);

                    // ✅ descarga compatible con celular
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'inspection.pdf';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                })
                .catch(err => {
                    console.error("Error:", err);
                    alert("Error generating PDF");
                });
        }

        document.getElementById('form-container').addEventListener('click', function (e) {

            const rect = this.getBoundingClientRect();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            console.log("HTML CLICK → X:", Math.round(x), "Y:", Math.round(y));

        });

        document.addEventListener("DOMContentLoaded", function () {

            const fields = document.querySelectorAll(".fieldX");

            fields.forEach(field => {

                // evita escribir manualmente
                field.readOnly = true;

                // cursor tipo botón
                field.style.cursor = "pointer";

                // click desktop + tap mobile
                field.addEventListener("click", function () {

                    // toggle X
                    if (field.value === "X") {
                        field.value = "";
                    } else {
                        field.value = "X";
                    }

                });

            });

const comments = document.getElementById('comments');

comments.addEventListener('input', function () {
