<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador - Banglabash WorkFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div>
                <h1><i class="fa-solid fa-users-cog"></i> Panel de Administrador</h1>
                <p>Gestionar Usuarios y Horas Globales</p>
            </div>
            <div class="user-actions" style="display: flex; gap: 1rem;">
                <button id="btn-back-home" class="btn-secondary" style="font-size: 0.9rem; padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-home"></i> Volver a la App
                </button>
                <button id="btn-logout" class="btn-primary"
                    style="background: var(--danger-color, #ef4444); border-color: var(--danger-color, #ef4444); font-size: 0.9rem; padding: 0.5rem 1rem;">
                    <i class="fa-solid fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </header>

        <main>
            <section class="glass" style="padding: 2rem; margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Administración</h2>
                    <div>
                        <button id="btn-view-users" class="btn-primary" style="margin-right: 10px;">Usuarios</button>
                        <button id="btn-view-all-hours" class="btn-secondary">Horas Globales</button>
                    </div>
                </div>

                <!-- Admin Users View -->
                <div id="admin-users-view">
                    <h3>Lista de Usuarios</h3>
                    <div id="admin-users-list" class="entries-list">
                        <!-- Users injected here -->
                    </div>
                </div>

                <!-- Admin All Hours View -->
                <div id="admin-all-hours-view" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>Todas las Horas Registradas</h3>
                        <p><strong>Total Global:</strong> <span id="admin-global-total">0h 0m</span></p>
                    </div>
                    <div id="admin-all-hours-list" class="entries-list" style="margin-top: 1rem;">
                        <!-- Hours injected here -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Admin Reset Password Modal -->
        <div id="admin-reset-pw-modal" class="modal-overlay"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center;">
            <div class="card glass" style="width: 100%; max-width: 400px; padding: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="margin: 0;">Resetear Contraseña</h3>
                    <button id="close-admin-reset-modal"
                        style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;"><i
                            class="fa-solid fa-times"></i></button>
                </div>
                <form id="admin-reset-pw-form">
                    <div style="margin-bottom: 1rem;">
                        <strong>Usuario: </strong> <span id="admin-reset-pw-username"></span>
                    </div>
                    <div class="form-group">
                        <label for="admin-new-password">Nueva Contraseña</label>
                        <input type="password" id="admin-new-password" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Cambiar Contraseña</button>
                    <div id="admin-password-error" class="error-msg" style="margin-top: 1rem; text-align: center;">
                    </div>
                </form>
            </div>
        </div>

        <!-- Admin User Specific Hours Modal -->
        <div id="admin-user-hours-modal" class="modal-overlay"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1002; justify-content: center; align-items: center; overflow-y: auto; padding: 2rem;">
            <div class="card glass"
                style="width: 100%; max-width: 800px; padding: 2rem; max-height: 90vh; overflow-y: auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="margin: 0;">Horas de: <span id="admin-user-hours-username"
                            style="color: var(--primary-color);"></span></h3>
                    <button id="close-admin-user-hours-modal"
                        style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;"><i
                            class="fa-solid fa-times"></i></button>
                </div>
                <div style="margin-bottom: 1rem;">
                    <strong>Total Acumulado:</strong> <span id="admin-user-total-hours"
                        style="color: #10b981; font-weight: bold;">0h 0m</span>
                </div>
                <div id="admin-user-specific-hours-list" class="entries-list">
                    <!-- Specific User Hours injected here -->
                </div>
            </div>
        </div>

    </div>

    <script src="admin.js"></script>
</body>

</html>
